<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyDesk · Airline Operations Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@700;800&family=Archivo:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ============ Tokens ============ */
        :root{
            --navy-950:#0a1622;
            --navy-900:#0d1f30;
            --navy-800:#142a40;
            --navy-700:#1c3a56;
            --navy-600:#2a4f73;
            --paper:#f6f3ec;
            --paper-dim:#ece7d9;
            --paper-line:#d8d2c0;
            --amber:#e8a33d;
            --amber-bright:#f5b855;
            --teal:#2f9e8f;
            --teal-dim:#1f6e63;
            --red:#d1483a;
            --red-dim:#8f2e24;
            --ink:#0d1f30;
            --ink-soft:#4a5a6a;
            --white:#ffffff;
            --radius-sm:6px;
            --radius-md:10px;
            --radius-lg:16px;
            --shadow-1:0 1px 2px rgba(10,22,34,.06), 0 1px 1px rgba(10,22,34,.04);
            --shadow-2:0 8px 24px rgba(10,22,34,.12), 0 2px 6px rgba(10,22,34,.08);
            --shadow-3:0 24px 60px rgba(10,22,34,.35);
            --font-display:'Archivo Expanded', 'Archivo', sans-serif;
            --font-body:'Inter', sans-serif;
            --font-mono:'JetBrains Mono', monospace;
        }

        *{box-sizing:border-box;}
        html,body{margin:0;padding:0;}
        body{
            font-family:var(--font-body);
            background:var(--navy-950);
            color:var(--ink);
            -webkit-font-smoothing:antialiased;
            min-height:100vh;
        }
        button{font-family:inherit;cursor:pointer;}
        input,select,textarea{font-family:inherit;}
        a{color:inherit;}

        @media (prefers-reduced-motion: reduce){
            *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
        }

        /* ============ App shell ============ */
        .app{
            display:grid;
            grid-template-columns:248px 1fr;
            min-height:100vh;
        }

        /* ----- Sidebar ----- */
        .sidebar{
            background:
                    linear-gradient(180deg, var(--navy-900) 0%, var(--navy-950) 100%);
            color:var(--paper);
            padding:24px 14px 20px;
            display:flex;
            flex-direction:column;
            position:sticky;
            top:0;
            height:100vh;
            border-right:1px solid rgba(255,255,255,.06);
        }
        .brand{
            display:flex;
            align-items:center;
            gap:10px;
            padding:4px 10px 22px;
            margin-bottom:6px;
            border-bottom:1px solid rgba(255,255,255,.08);
        }
        .brand-mark{
            width:34px;height:34px;
            border-radius:9px;
            background:linear-gradient(135deg, var(--amber) 0%, var(--amber-bright) 100%);
            display:flex;align-items:center;justify-content:center;
            flex-shrink:0;
            box-shadow:0 4px 10px rgba(232,163,61,.35);
        }
        .brand-mark svg{width:18px;height:18px;}
        .brand-text{display:flex;flex-direction:column;line-height:1.1;}
        .brand-text strong{font-family:var(--font-display);font-size:16.5px;letter-spacing:.01em;color:var(--paper);}
        .brand-text span{font-size:10.5px;color:rgba(246,243,236,.5);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}

        .nav-group{margin-top:18px;}
        .nav-label{
            font-size:10px;
            text-transform:uppercase;
            letter-spacing:.1em;
            color:rgba(246,243,236,.38);
            padding:0 12px 8px;
            font-weight:600;
        }
        .nav-item{
            display:flex;
            align-items:center;
            gap:11px;
            padding:9px 12px;
            border-radius:8px;
            color:rgba(246,243,236,.72);
            font-size:13.5px;
            font-weight:500;
            margin-bottom:2px;
            border:none;
            background:transparent;
            width:100%;
            text-align:left;
            transition:background .15s ease, color .15s ease;
            position:relative;
        }
        .nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.85;}
        .nav-item:hover{background:rgba(255,255,255,.06);color:var(--paper);}
        .nav-item.active{
            background:rgba(232,163,61,.14);
            color:var(--amber-bright);
        }
        .nav-item.active::before{
            content:'';
            position:absolute;left:-14px;top:50%;transform:translateY(-50%);
            width:3px;height:18px;border-radius:2px;
            background:var(--amber);
        }
        .nav-item .count{
            margin-left:auto;
            font-family:var(--font-mono);
            font-size:10.5px;
            color:rgba(246,243,236,.4);
            background:rgba(255,255,255,.06);
            padding:1px 6px;
            border-radius:20px;
        }
        .sidebar-foot{
            margin-top:auto;
            padding:12px;
            border-top:1px solid rgba(255,255,255,.08);
            font-size:11px;
            color:rgba(246,243,236,.4);
            display:flex;
            align-items:center;
            gap:8px;
        }
        .api-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(47,158,143,.2);flex-shrink:0;}
        .api-dot.off{background:var(--red);box-shadow:0 0 0 3px rgba(209,72,58,.2);}

        /* ----- Main ----- */
        .main{
            background:var(--paper);
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }
        .topbar{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:20px 32px;
            border-bottom:1px solid var(--paper-line);
            background:var(--paper);
            position:sticky;
            top:0;
            z-index:20;
        }
        .topbar-title{font-family:var(--font-display);font-size:22px;color:var(--ink);letter-spacing:-.01em;}
        .topbar-sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
        .topbar-right{display:flex;align-items:center;gap:10px;}

        .btn{
            display:inline-flex;align-items:center;gap:7px;
            padding:9px 16px;
            border-radius:8px;
            font-size:13.5px;
            font-weight:600;
            border:1px solid transparent;
            transition:transform .1s ease, box-shadow .15s ease, background .15s ease;
        }
        .btn svg{width:14px;height:14px;}
        .btn:active{transform:scale(.97);}
        .btn-primary{background:var(--navy-900);color:var(--paper);box-shadow:var(--shadow-1);}
        .btn-primary:hover{background:var(--navy-800);box-shadow:var(--shadow-2);}
        .btn-amber{background:var(--amber);color:var(--navy-950);box-shadow:0 2px 8px rgba(232,163,61,.4);}
        .btn-amber:hover{background:var(--amber-bright);}
        .btn-ghost{background:transparent;color:var(--ink);border-color:var(--paper-line);}
        .btn-ghost:hover{background:var(--paper-dim);}
        .btn-danger-ghost{background:transparent;color:var(--red-dim);border-color:rgba(209,72,58,.3);}
        .btn-danger-ghost:hover{background:rgba(209,72,58,.08);}
        .btn-sm{padding:6px 11px;font-size:12.5px;border-radius:6px;}
        .btn:disabled{opacity:.5;cursor:not-allowed;}

        .content{
            padding:28px 32px 60px;
            flex:1;
        }
        .view{display:none;}
        .view.active{display:block;animation:fadein .25s ease;}
        @keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

        /* ----- Stat cards (dashboard) ----- */
        .stat-grid{
            display:grid;
            grid-template-columns:repeat(4, 1fr);
            gap:14px;
            margin-bottom:24px;
        }
        .stat-card{
            background:var(--white);
            border:1px solid var(--paper-line);
            border-radius:var(--radius-md);
            padding:18px 18px 16px;
            box-shadow:var(--shadow-1);
            position:relative;
            overflow:hidden;
        }
        .stat-card::after{
            content:'';
            position:absolute; right:-10px; top:-10px;
            width:70px;height:70px;border-radius:50%;
            background:var(--stat-tint, rgba(232,163,61,.08));
        }
        .stat-label{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
        .stat-value{font-family:var(--font-display);font-size:30px;margin-top:6px;color:var(--ink);position:relative;z-index:1;}
        .stat-sub{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}

        /* ----- Split-flap board ----- */
        .flap-board{
            background:var(--navy-950);
            border-radius:var(--radius-lg);
            padding:18px 18px 8px;
            box-shadow:var(--shadow-3);
            margin-bottom:26px;
            overflow-x:auto;
        }
        .flap-board-head{
            display:flex;justify-content:space-between;align-items:center;
            padding:0 6px 14px;
            color:var(--paper);
        }
        .flap-board-head h3{font-family:var(--font-display);font-size:14px;letter-spacing:.08em;text-transform:uppercase;margin:0;color:var(--amber-bright);}
        .flap-board-head .hint{font-size:11px;color:rgba(246,243,236,.4);font-family:var(--font-mono);}
        .flap-table{width:100%;border-collapse:collapse;min-width:760px;}
        .flap-table th{
            text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.08em;
            color:rgba(246,243,236,.45);font-weight:600;
            padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.08);
        }
        .flap-table td{
            padding:10px 10px;
            font-family:var(--font-mono);
            font-size:13px;
            color:var(--paper);
            border-bottom:1px solid rgba(255,255,255,.05);
        }
        .flap-table tr:last-child td{border-bottom:none;}
        .flap-table tr:hover td{background:rgba(255,255,255,.03);}
        .flap-num{color:var(--amber-bright);font-weight:700;letter-spacing:.04em;}

        .pill{
            display:inline-flex;align-items:center;gap:5px;
            padding:3px 9px;border-radius:20px;
            font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
            font-family:var(--font-mono);
        }
        .pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
        .pill-scheduled{background:rgba(47,158,143,.16);color:var(--teal);}
        .pill-boarding{background:rgba(232,163,61,.18);color:var(--amber);}
        .pill-departed{background:rgba(120,140,160,.18);color:#9fb3c4;}
        .pill-arrived{background:rgba(120,140,160,.18);color:#9fb3c4;}
        .pill-delayed{background:rgba(232,163,61,.18);color:var(--amber);}
        .pill-cancelled{background:rgba(209,72,58,.18);color:#f2887c;}
        .pill-confirmed{background:rgba(47,158,143,.16);color:var(--teal);}
        .pill-pending{background:rgba(232,163,61,.18);color:var(--amber);}
        .pill-expired{background:rgba(120,140,160,.18);color:#9fb3c4;}
        .pill-success{background:rgba(47,158,143,.16);color:var(--teal);}
        .pill-failed{background:rgba(209,72,58,.18);color:#f2887c;}
        .pill-refunded{background:rgba(120,140,160,.18);color:#9fb3c4;}
        .pill-active{background:rgba(47,158,143,.16);color:var(--teal);}
        .pill-inactive{background:rgba(120,140,160,.18);color:#9fb3c4;}
        .pill-maintenance{background:rgba(232,163,61,.18);color:var(--amber);}
        .pill-available{background:rgba(47,158,143,.16);color:var(--teal);}
        .pill-held{background:rgba(232,163,61,.18);color:var(--amber);}
        .pill-booked{background:rgba(58,110,209,.18);color:#8fb0f2;}
        .pill-blocked{background:rgba(209,72,58,.18);color:#f2887c;}

        /* light pills for paper background tables */
        .pill-light.pill-scheduled,.pill-light.pill-confirmed,.pill-light.pill-success,.pill-light.pill-active,.pill-light.pill-available{background:rgba(47,158,143,.12);color:var(--teal-dim);}
        .pill-light.pill-boarding,.pill-light.pill-pending,.pill-light.pill-delayed,.pill-light.pill-maintenance,.pill-light.pill-held{background:rgba(232,163,61,.18);color:#9a6313;}
        .pill-light.pill-cancelled,.pill-light.pill-failed,.pill-light.pill-blocked{background:rgba(209,72,58,.12);color:var(--red-dim);}
        .pill-light.pill-departed,.pill-light.pill-arrived,.pill-light.pill-expired,.pill-light.pill-refunded,.pill-light.pill-inactive{background:rgba(74,90,106,.12);color:var(--ink-soft);}
        .pill-light.pill-booked{background:rgba(58,110,209,.12);color:#2a52a8;}

        /* ----- Section panel ----- */
        .panel{
            background:var(--white);
            border:1px solid var(--paper-line);
            border-radius:var(--radius-md);
            box-shadow:var(--shadow-1);
            margin-bottom:22px;
        }
        .panel-head{
            display:flex;align-items:center;justify-content:space-between;
            padding:16px 20px;
            border-bottom:1px solid var(--paper-line);
            gap:12px;
            flex-wrap:wrap;
        }
        .panel-head h3{font-family:var(--font-display);font-size:15.5px;margin:0;color:var(--ink);}
        .panel-head .meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
        .panel-body{padding:18px 20px;}
        .panel-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

        .search-box{
            display:flex;align-items:center;gap:7px;
            border:1px solid var(--paper-line);
            border-radius:8px;
            padding:7px 11px;
            background:var(--paper);
            min-width:200px;
        }
        .search-box svg{width:14px;height:14px;color:var(--ink-soft);flex-shrink:0;}
        .search-box input{border:none;background:none;outline:none;font-size:13px;width:100%;color:var(--ink);}

        /* ----- Data table ----- */
        .table-wrap{overflow-x:auto;}
        table.data{width:100%;border-collapse:collapse;font-size:13.5px;}
        table.data th{
            text-align:left;padding:10px 14px;
            font-size:11px;text-transform:uppercase;letter-spacing:.05em;
            color:var(--ink-soft);font-weight:600;
            border-bottom:1px solid var(--paper-line);
            white-space:nowrap;
            position:sticky;top:0;background:var(--white);
        }
        table.data td{
            padding:11px 14px;
            border-bottom:1px solid var(--paper-dim);
            color:var(--ink);
            white-space:nowrap;
        }
        table.data tbody tr:hover{background:#fbf9f4;}
        table.data tbody tr:last-child td{border-bottom:none;}
        .mono{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-soft);}
        .row-actions{display:flex;gap:6px;}
        .icon-btn{
            display:inline-flex;align-items:center;justify-content:center;
            width:30px;height:30px;border-radius:7px;
            border:1px solid var(--paper-line);background:var(--white);color:var(--ink-soft);
            transition:background .15s, color .15s, border-color .15s;
        }
        .icon-btn svg{width:14px;height:14px;}
        .icon-btn:hover{background:var(--paper-dim);color:var(--ink);}
        .icon-btn.danger:hover{background:rgba(209,72,58,.08);color:var(--red-dim);border-color:rgba(209,72,58,.3);}
        .icon-btn.go:hover{background:rgba(47,158,143,.1);color:var(--teal-dim);border-color:rgba(47,158,143,.3);}

        .empty-state{
            text-align:center;padding:48px 20px;color:var(--ink-soft);
        }
        .empty-state svg{width:38px;height:38px;opacity:.3;margin-bottom:10px;}
        .empty-state p{margin:0;font-size:13.5px;}
        .empty-state .sub{font-size:12px;margin-top:4px;opacity:.8;}

        .skeleton-row td{padding:13px 14px;}
        .skeleton{height:13px;border-radius:4px;background:linear-gradient(90deg, var(--paper-dim) 25%, #f4f1e9 37%, var(--paper-dim) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;}
        @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

        /* ----- Forms / modal ----- */
        .overlay{
            position:fixed;inset:0;background:rgba(10,22,34,.55);
            display:none;align-items:flex-start;justify-content:center;
            padding:40px 20px;overflow-y:auto;z-index:100;
            backdrop-filter:blur(2px);
        }
        .overlay.active{display:flex;animation:fadein .15s ease;}
        .modal{
            background:var(--white);
            border-radius:var(--radius-lg);
            width:100%;max-width:560px;
            box-shadow:var(--shadow-3);
            overflow:hidden;
        }
        .modal.wide{max-width:680px;}
        .modal-head{
            display:flex;align-items:center;justify-content:space-between;
            padding:18px 22px;border-bottom:1px solid var(--paper-line);
            background:var(--navy-950);
        }
        .modal-head h3{font-family:var(--font-display);font-size:16px;color:var(--paper);margin:0;}
        .modal-head .close-x{
            background:none;border:none;color:rgba(246,243,236,.6);width:28px;height:28px;border-radius:6px;
            display:flex;align-items:center;justify-content:center;
        }
        .modal-head .close-x:hover{background:rgba(255,255,255,.08);color:var(--paper);}
        .modal-head .close-x svg{width:16px;height:16px;}
        .modal-body{padding:20px 22px;max-height:64vh;overflow-y:auto;}
        .modal-foot{
            padding:16px 22px;border-top:1px solid var(--paper-line);
            display:flex;justify-content:flex-end;gap:10px;background:var(--paper);
        }

        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        .form-field{display:flex;flex-direction:column;gap:6px;}
        .form-field.full{grid-column:1 / -1;}
        .form-field label{font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
        .form-field input, .form-field select, .form-field textarea{
            border:1px solid var(--paper-line);border-radius:7px;
            padding:9px 11px;font-size:13.5px;color:var(--ink);background:var(--paper);
            outline:none;transition:border-color .15s, background .15s;
        }
        .form-field input:focus, .form-field select:focus, .form-field textarea:focus{
            border-color:var(--amber);background:var(--white);
        }
        .form-field .field-err{font-size:11.5px;color:var(--red-dim);min-height:14px;}
        .form-field input.err, .form-field select.err{border-color:var(--red);}
        .form-hint{font-size:11.5px;color:var(--ink-soft);margin-top:-2px;}

        /* ----- Toasts ----- */
        .toast-stack{
            position:fixed;bottom:22px;right:22px;z-index:200;
            display:flex;flex-direction:column;gap:10px;align-items:flex-end;
        }
        .toast{
            display:flex;align-items:flex-start;gap:10px;
            background:var(--navy-950);color:var(--paper);
            padding:13px 16px;border-radius:10px;box-shadow:var(--shadow-3);
            max-width:340px;font-size:13.5px;line-height:1.4;
            animation:toastin .2s ease;border-left:3px solid var(--teal);
        }
        .toast.error{border-left-color:var(--red);}
        .toast svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;}
        .toast .t-title{font-weight:700;margin-bottom:1px;}
        .toast .t-msg{color:rgba(246,243,236,.75);}
        @keyframes toastin{from{opacity:0;transform:translateX(12px);}to{opacity:1;transform:translateX(0);}}

        /* ----- Confirm dialog ----- */
        .confirm-box{max-width:400px;}
        .confirm-body{padding:22px;text-align:left;}
        .confirm-body p{margin:0 0 4px;color:var(--ink);font-size:14px;}
        .confirm-body .sub{color:var(--ink-soft);font-size:12.5px;}

        /* ----- Boarding pass card (booking detail) ----- */
        .boarding-pass{
            display:flex;
            border-radius:var(--radius-md);
            overflow:hidden;
            box-shadow:var(--shadow-2);
            border:1px solid var(--paper-line);
        }
        .bp-main{
            flex:1;background:var(--white);padding:20px 22px;
            display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;
        }
        .bp-stub{
            width:130px;background:var(--navy-950);color:var(--paper);
            padding:20px 16px;display:flex;flex-direction:column;justify-content:space-between;
            position:relative;
            border-left:2px dashed rgba(246,243,236,.25);
        }
        .bp-stub .pnr-label{font-size:9px;text-transform:uppercase;color:rgba(246,243,236,.45);letter-spacing:.08em;}
        .bp-stub .pnr-val{font-family:var(--font-mono);font-size:17px;color:var(--amber-bright);font-weight:700;margin-top:2px;}
        .bp-field label{display:block;font-size:9.5px;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.07em;font-weight:600;margin-bottom:3px;}
        .bp-field .val{font-family:var(--font-mono);font-size:14px;color:var(--ink);font-weight:600;}

        /* ----- Misc ----- */
        .section-intro{margin-bottom:18px;}
        .section-intro h2{font-family:var(--font-display);font-size:19px;margin:0 0 4px;color:var(--ink);}
        .section-intro p{font-size:13px;color:var(--ink-soft);margin:0;max-width:560px;}

        .tag-row{display:flex;gap:6px;flex-wrap:wrap;}
        .required-mark{color:var(--red);}

        .loader-inline{display:inline-flex;align-items:center;gap:7px;color:var(--ink-soft);font-size:13px;}
        .spin{width:14px;height:14px;border:2px solid var(--paper-line);border-top-color:var(--navy-900);border-radius:50%;animation:spin .7s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}

        .help-banner{
            display:flex;gap:10px;align-items:flex-start;
            background:rgba(232,163,61,.1);border:1px solid rgba(232,163,61,.3);
            border-radius:8px;padding:12px 14px;margin-bottom:18px;font-size:12.5px;color:#7a5210;
        }
        .help-banner svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;}
        .help-banner.error{background:rgba(209,72,58,.08);border-color:rgba(209,72,58,.3);color:var(--red-dim);}
        .help-banner.error svg{color:var(--red-dim);}

        @media (max-width: 980px){
            .app{grid-template-columns:1fr;}
            .sidebar{position:fixed;left:-260px;width:240px;height:100vh;z-index:90;transition:left .2s ease;}
            .sidebar.open{left:0;}
            .topbar{padding:16px 18px;}
            .content{padding:20px 16px 48px;}
            .stat-grid{grid-template-columns:1fr 1fr;}
            .form-grid{grid-template-columns:1fr;}
            .bp-main{grid-template-columns:1fr 1fr;}
            .menu-toggle{display:flex !important;}
        }
        .menu-toggle{display:none;background:none;border:none;color:var(--ink);padding:6px;}
        .menu-toggle svg{width:20px;height:20px;}
        .sidebar-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:80;}
        .sidebar-scrim.active{display:block;}
    </style>
</head>
<body>

<div class="app">
    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <div class="brand-mark">
                <svg viewBox="0 0 24 24" fill="none"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 00-3 0V9l-8 5v2l8-2.5V18l-2.5 2v1.5l4-1 4 1V20l-2.5-2v-4.5l8 2.5z" fill="#0a1622"/></svg>
            </div>
            <div class="brand-text">
                <strong>SkyDesk</strong>
                <span>Ops Console</span>
            </div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Overview</div>
            <button class="nav-item" data-view="dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
                Dashboard
            </button>
        </div>

        <div class="nav-group">
            <div class="nav-label">Operations</div>
            <button class="nav-item" data-view="flights">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 00-3 0V9l-8 5v2l8-2.5V18l-2.5 2v1.5l4-1 4 1V20l-2.5-2v-4.5z"/></svg>
                Flights <span class="count" id="cnt-flights">–</span>
            </button>
            <button class="nav-item" data-view="airports">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>
                Airports <span class="count" id="cnt-airports">–</span>
            </button>
            <button class="nav-item" data-view="aircraft">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M8 6v-2a1 1 0 011-1h6a1 1 0 011 1v2"/></svg>
                Aircraft <span class="count" id="cnt-aircraft">–</span>
            </button>
            <button class="nav-item" data-view="seats">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 11V5a2 2 0 012-2h2a2 2 0 012 2v6M5 11h12M5 11v6a2 2 0 002 2h8a2 2 0 002-2v-6M19 11V8a1 1 0 00-1-1h-1"/></svg>
                Seats <span class="count" id="cnt-seats">–</span>
            </button>
            <button class="nav-item" data-view="flightseats">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.2"/><rect x="14" y="3" width="7" height="7" rx="1.2"/><rect x="3" y="14" width="7" height="7" rx="1.2"/><rect x="14" y="14" width="7" height="7" rx="1.2"/></svg>
                Flight Seats <span class="count" id="cnt-flightseats">–</span>
            </button>
        </div>

        <div class="nav-group">
            <div class="nav-label">Reservations</div>
            <button class="nav-item" data-view="bookings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>
                Bookings <span class="count" id="cnt-bookings">–</span>
            </button>
            <button class="nav-item" data-view="passengers">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0114 0v1"/></svg>
                Passengers <span class="count" id="cnt-passengers">–</span>
            </button>
            <button class="nav-item" data-view="tickets">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9a2 2 0 012-2h14a2 2 0 012 2v1.5a1.5 1.5 0 000 3V15a2 2 0 01-2 2H5a2 2 0 01-2-2v-1.5a1.5 1.5 0 000-3V9z"/><path d="M9 7v10" stroke-dasharray="2 2"/></svg>
                Tickets <span class="count" id="cnt-tickets">–</span>
            </button>
            <button class="nav-item" data-view="payments">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                Payments <span class="count" id="cnt-payments">–</span>
            </button>
        </div>

        <div class="nav-group">
            <div class="nav-label">People &amp; system</div>
            <button class="nav-item" data-view="users">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0113 0"/></svg>
                Users <span class="count" id="cnt-users">–</span>
            </button>
            <button class="nav-item" data-view="notifications">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                Notifications <span class="count" id="cnt-notifications">–</span>
            </button>
        </div>

        <div class="sidebar-foot">
            <span class="api-dot" id="api-status-dot"></span>
            <span id="api-status-text">Checking API…</span>
        </div>
    </aside>

    <div class="sidebar-scrim" id="sidebarScrim"></div>

    <!-- ============ MAIN ============ -->
    <main class="main">
        <div class="topbar">
            <div style="display:flex;align-items:center;gap:10px;">
                <button class="menu-toggle" id="menuToggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
                </button>
                <div>
                    <div class="topbar-title" id="viewTitle">Dashboard</div>
                    <div class="topbar-sub" id="viewSub">Live operational snapshot</div>
                </div>
            </div>
            <div class="topbar-right" id="topbarActions"></div>
        </div>

        <div class="content" id="content">
            <!-- views injected here -->
        </div>
    </main>
</div>

<div class="overlay" id="overlay">
    <div class="modal" id="modal"></div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script src="app.js"></script>
</body>
</html>
